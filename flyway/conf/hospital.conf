# Flyway config for the HOSPITAL model.
# `postgres` is the Docker Compose service hostname (resolved on the dbmig network).
flyway.url=jdbc:postgresql://postgres:5432/flyway_hospital
flyway.user=postgres
flyway.password=postgres
flyway.locations=filesystem:/flyway/sql/hospital
flyway.schemas=public
# Lets `migrate` run against a brand-new empty database without a separate `baseline` step.
flyway.baselineOnMigrate=true
