# Liquibase config for the HOSPITAL model.
# The Docker image puts /liquibase/changelog on the search path, so changelog-file
# is given relative to that directory.
url: jdbc:postgresql://postgres:5432/liquibase_hospital
username: postgres
password: postgres
# Root for resolving changelog-file and the include: paths inside the master changelog.
searchPath: /liquibase/changelog
changelog-file: hospital/db.changelog-master.yaml
