# V1: core e-commerce tables (3NF).
databaseChangeLog:
  - changeSet:
      id: ecommerce-1-customers
      author: data_engineer
      changes:
        - createTable:
            tableName: customers
            columns:
              - column: { name: customer_id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: first_name, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: last_name, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: email, type: VARCHAR(120), constraints: { nullable: false, unique: true } }

  - changeSet:
      id: ecommerce-1-addresses
      author: data_engineer
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column: { name: address_id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column:
                  name: customer_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_addresses_customer, references: customers(customer_id) }
              - column: { name: line1, type: VARCHAR(120), constraints: { nullable: false } }
              - column: { name: city, type: VARCHAR(80), constraints: { nullable: false } }
              - column: { name: postal_code, type: VARCHAR(20), constraints: { nullable: false } }
              - column: { name: country, type: VARCHAR(60), constraints: { nullable: false } }

  - changeSet:
      id: ecommerce-1-categories
      author: data_engineer
      changes:
        - createTable:
            tableName: categories
            columns:
              - column: { name: category_id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(80), constraints: { nullable: false } }
              - column:
                  name: parent_category_id
                  type: INT
                  constraints: { foreignKeyName: fk_categories_parent, references: categories(category_id) }

  - changeSet:
      id: ecommerce-1-products
      author: data_engineer
      changes:
        - createTable:
            tableName: products
            columns:
              - column: { name: product_id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column:
                  name: category_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_products_category, references: categories(category_id) }
              - column: { name: sku, type: VARCHAR(40), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: VARCHAR(120), constraints: { nullable: false } }
              - column: { name: unit_price, type: "NUMERIC(10,2)", constraints: { nullable: false } }
        - sql:
            sql: ALTER TABLE products ADD CONSTRAINT chk_products_price CHECK (unit_price >= 0)

  - changeSet:
      id: ecommerce-1-orders
      author: data_engineer
      changes:
        - createTable:
            tableName: orders
            columns:
              - column: { name: order_id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column:
                  name: customer_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_orders_customer, references: customers(customer_id) }
              - column:
                  name: shipping_address_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_orders_address, references: addresses(address_id) }
              - column: { name: placed_at, type: TIMESTAMP, defaultValueComputed: now(), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(20), defaultValue: pending, constraints: { nullable: false } }
        - sql:
            sql: ALTER TABLE orders ADD CONSTRAINT chk_orders_status CHECK (status IN ('pending','paid','shipped','delivered','cancelled'))

  - changeSet:
      id: ecommerce-1-order-items
      author: data_engineer
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: order_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_items_order, references: orders(order_id) }
              - column:
                  name: product_id
                  type: INT
                  constraints: { nullable: false, foreignKeyName: fk_items_product, references: products(product_id) }
              - column: { name: quantity, type: INT, constraints: { nullable: false } }
              - column: { name: unit_price, type: "NUMERIC(10,2)", constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: order_items
            columnNames: order_id, product_id
            constraintName: pk_order_items
        - sql:
            sql: ALTER TABLE order_items ADD CONSTRAINT chk_order_items_qty CHECK (quantity > 0)
