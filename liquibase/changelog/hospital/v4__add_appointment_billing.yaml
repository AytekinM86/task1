# V4: dedicated ROLLBACK example.
#
# This uses a raw `sql` change, which Liquibase CANNOT auto-rollback (unlike
# addColumn/createTable). That's the whole point: the explicit `rollback:` block
# below is what makes `make lb-rollback` able to undo this change. Without it,
# rolling back this changeset would fail with "No inverse to ... could be created".
#
# Try it:
#   make lb-update   MODEL=hospital          # adds appointments.cost
#   make lb-rollback MODEL=hospital COUNT=1  # runs the rollback block -> drops it
databaseChangeLog:
  - changeSet:
      id: hospital-4-appointment-billing
      author: data_engineer
      changes:
        - sql:
            sql: ALTER TABLE appointments ADD COLUMN cost NUMERIC(10,2)
      rollback:
        - sql:
            sql: ALTER TABLE appointments DROP COLUMN cost
